<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fromness</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0d0d0d;
    --ink-faint: #9a9488;
    --rule: #ddd9d0;
    --cell: 13px;
    --gap: 2px;
    --label-w: 148px;
    --base: 15px;
  }

  html, body {
    background: transparent;
    font-family: 'Poppins', sans-serif;
    font-size: var(--base);
    font-weight: 300;
    color: var(--ink);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  #wrap {
    max-width: 780px;
    padding: 8px 0 40px;
    margin: 0;
  }

  /* ── Toggle ── */
  .fmns-toggle {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
  }

  .fmns-btn {
    background: transparent;
    border: 1.5px solid var(--ink);
    padding: 9px 22px;
    font-family: 'Poppins', sans-serif;
    font-size: 0.65rem;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink);
    cursor: pointer;
    transition: background 0.16s, color 0.16s;
    line-height: 1;
  }
  .fmns-btn:first-child {
    width: calc(var(--label-w) - 8px);
    flex-shrink: 0;
    padding-left: 0;
    padding-right: 0;
    text-align: center;
  }
  .fmns-btn.active { background: var(--ink); color: #f0ece4; }
  .fmns-btn:not(.active):hover { background: rgba(13,13,13,0.06); }

  /* ── Views ── */
  .fmns-view { display: none; }
  .fmns-view.active { display: block; }
  #fmns-grouped.active { padding-top: 24px; }
  #fmns-chrono.active  { padding-top: 8px; }

  /* ── Row ── */
  .fmns-row {
    display: flex;
    align-items: flex-start;
    margin-bottom: 12px;
  }

  .fmns-label {
    width: var(--label-w);
    flex-shrink: 0;
    padding-right: 16px;
    text-align: right;
  }

  .fmns-name-line {
    display: flex;
    justify-content: flex-end;
    align-items: baseline;
    gap: 5px;
    min-height: var(--cell);
  }

  .fmns-name {
    font-size: 0.85rem;
    font-weight: 400;
    color: var(--ink);
    line-height: 1.2;
    white-space: nowrap;
  }
  .fmns-name.root { font-weight: 400; }

  .fmns-country {
    font-size: 0.72rem;
    color: var(--ink-faint);
    font-weight: 300;
    white-space: nowrap;
  }

  .fmns-dur {
    font-size: 0.72rem;
    color: var(--ink-faint);
    font-weight: 300;
    display: block;
    text-align: right;
    margin-top: 1px;
  }

  /* ── Grid ── */
  .fmns-grid {
    display: flex;
    flex-wrap: wrap;
    gap: var(--gap);
    flex: 1;
    align-content: flex-start;
  }

  /* ── Cells ── */
  .fmns-cell {
    width: var(--cell);
    height: var(--cell);
    border-radius: 0;
    flex-shrink: 0;
    display: block;
    cursor: default;
    transition: opacity 0.12s;
  }
  .fmns-cell:hover { opacity: 0.6; }
  .fmns-cell.jspur {
    background: transparent !important;
    border: 1.5px solid var(--ink);
    opacity: 0.65;
  }
  .fmns-cell.jspur:hover { opacity: 1; }

  /* ── Divider ── */
  .fmns-divider {
    height: 1px;
    background: var(--rule);
    margin: 14px 0 14px var(--label-w);
    border: none;
  }

  /* ── Year ruler ── */
  .fmns-ruler {
    margin-bottom: 6px;
    position: relative;
    height: 16px;
    pointer-events: none;
  }
  .fmns-ruler span {
    position: absolute;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: var(--ink-faint);
    white-space: nowrap;
    transform: translateX(-50%);
    font-weight: 300;
    text-transform: uppercase;
    line-height: 1;
  }

  /* ── Stream ── */
  .fmns-stream {
    display: flex;
    flex-wrap: wrap;
    gap: var(--gap);
  }

  /* ── Legend ── */
  .fmns-legend {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 14px 24px;
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--rule);
  }

  .fmns-legend-item {
    display: flex;
    align-items: center;
    gap: 9px;
  }

  .fmns-swatch {
    width: 11px;
    height: 11px;
    border-radius: 0;
    flex-shrink: 0;
    display: block;
  }
  .fmns-swatch.jspur {
    background: transparent !important;
    border: 1.5px solid var(--ink);
  }

  .fmns-legend-text { display: flex; flex-direction: column; }

  .fmns-lname-line {
    display: flex;
    gap: 4px;
    align-items: baseline;
  }
  .fmns-lname {
    font-size: 0.82rem;
    color: var(--ink);
    font-weight: 400;
    line-height: 1.3;
  }
  .fmns-lcountry {
    font-size: 0.68rem;
    color: var(--ink-faint);
    font-weight: 300;
    line-height: 1.3;
  }
  .fmns-ldur {
    font-size: 0.68rem;
    color: var(--ink-faint);
    font-weight: 300;
    line-height: 1.3;
  }

  /* ── Tooltip ── */
  #fmns-tip {
    position: fixed;
    background: #f5f0ea;
    color: #0d0d0d;
    border: 1px solid #ccc0b0;
    font-size: 0.7rem;
    font-family: 'Poppins', sans-serif;
    font-weight: 300;
    padding: 6px 10px;
    pointer-events: none;
    opacity: 0;
    z-index: 9999;
    white-space: nowrap;
    line-height: 1.5;
    transition: opacity 0.1s;
    letter-spacing: 0.02em;
  }
  @media (prefers-color-scheme: dark) {
    #fmns-tip { color: #2a1f14; }
  }

  /* ── Mobile ── */
  @media (max-width: 560px) {
    :root {
      --cell: 9px;
      --gap: 2px;
      --label-w: 96px;
    }
    .fmns-name { font-size: 0.72rem; white-space: normal; }
    .fmns-country { font-size: 0.62rem; }
    .fmns-dur { font-size: 0.62rem; }
    .fmns-name-line { flex-wrap: wrap; gap: 2px; }
    .fmns-legend { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
    .fmns-btn { padding: 8px 14px; font-size: 0.6rem; }
  }
</style>
</head>
<body>

<div id="fmns-tip"></div>

<div id="wrap">
  <div class="fmns-toggle">
    <button class="fmns-btn active" data-view="grouped">By place</button>
    <button class="fmns-btn" data-view="chrono">Chronological</button>
  </div>

  <div class="fmns-view active" id="fmns-grouped"></div>

</div>

const MO = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const placeMonths = {};
Object.entries(MONTH_DATA).forEach(([k,p]) => {
  if (!placeMonths[p]) placeMonths[p] = [];
  placeMonths[p].push(k);
});
const ALL_KEYS = Object.keys(MONTH_DATA).sort();

function fmtDur(n) {
  const y = Math.floor(n/12), m = n%12;
  if (y===0) return m+' mo';
  if (m===0) return y+' yr';
  return y+' yr '+m+' mo';
}

// Tooltip
const tip = document.getElementById('fmns-tip');
function addTip(el, text) {
  el.addEventListener('mouseenter', () => { tip.textContent = text; tip.style.opacity = 1; });
  el.addEventListener('mousemove',  e => { tip.style.left=(e.clientX+12)+'px'; tip.style.top=(e.clientY-34)+'px'; });
  el.addEventListener('mouseleave', () => { tip.style.opacity = 0; });
}

function makeCell(key, place) {
  const [y,m] = key.split('-').map(Number);
  const el = document.createElement('span');
  el.className = 'fmns-cell' + (CITY_META[place]?.isRoot ? ' jspur' : '');
  if (!CITY_META[place]?.isRoot) el.style.background = CITY_META[place]?.color || '#ccc';
  addTip(el, MO[m-1]+' '+y+' · '+place);
  return el;
}

function makeDivider() {
  const d = document.createElement('div');
  d.className = 'fmns-divider';
  return d;
}

  lbl.className = 'fmns-label';
  lbl.innerHTML =
    '<div class="fmns-name-line">' +
      '<span class="fmns-name'+(isRoot?' root':'')+'">'+place+'</span>' +
      '<span class="fmns-country">'+country+'</span>' +
    '</div>' +
    '<span class="fmns-dur">'+dur+'</span>';
  return lbl;
}

// ── BY PLACE ──────────────────────────────────────────────────────────────
const gView = document.getElementById('fmns-grouped');

const jKeys = (placeMonths['Jamshedpur']||[]).sort();
const jRow = document.createElement('div'); jRow.className = 'fmns-row';
jRow.appendChild(makeLabel('Jamshedpur','India',fmtDur(jKeys.length),true));
const jGrid = document.createElement('div'); jGrid.className = 'fmns-grid';
jKeys.forEach(k => jGrid.appendChild(makeCell(k,'Jamshedpur')));
jRow.appendChild(jGrid);
gView.appendChild(jRow);
gView.appendChild(makeDivider());

const sorted = Object.keys(placeMonths)
  .filter(p => !CITY_META[p]?.isRoot)
  .sort((a,b) => placeMonths[b].length - placeMonths[a].length);

sorted.forEach(place => {
  const keys = placeMonths[place].sort();
  const row = document.createElement('div'); row.className = 'fmns-row';
  row.appendChild(makeLabel(place, CITY_META[place]?.country, fmtDur(keys.length), false));
  const grid = document.createElement('div'); grid.className = 'fmns-grid';
  keys.forEach(k => grid.appendChild(makeCell(k, place)));
  row.appendChild(grid);
  gView.appendChild(row);
});

// ── CHRONO ────────────────────────────────────────────────────────────────
const cView = document.getElementById('fmns-chrono');

const ruler = document.createElement('div');
ruler.className = 'fmns-ruler';
cView.appendChild(ruler);

const stream = document.createElement('div');
stream.className = 'fmns-stream';
ALL_KEYS.forEach(k => stream.appendChild(makeCell(k, MONTH_DATA[k])));
cView.appendChild(stream);

const legend = document.createElement('div');
legend.className = 'fmns-legend';
['Jamshedpur',...sorted].forEach(place => {
  const meta = CITY_META[place];
  const item = document.createElement('div'); item.className = 'fmns-legend-item';
  const sw = document.createElement('span');
  sw.className = 'fmns-swatch'+(meta?.isRoot?' jspur':'');
  if (!meta?.isRoot) sw.style.background = meta?.color;
  const txt = document.createElement('div'); txt.className = 'fmns-legend-text';
  txt.innerHTML =
    '<div class="fmns-lname-line">'+
      '<span class="fmns-lname">'+place+'</span>'+
      '<span class="fmns-lcountry">'+(meta?.country||'')+'</span>'+
    '</div>'+
    '<span class="fmns-ldur">'+fmtDur(placeMonths[place]?.length||0)+'</span>';
  item.appendChild(sw); item.appendChild(txt);
  legend.appendChild(item);
});
cView.appendChild(legend);

// Year ruler
function buildRuler() {
  ruler.innerHTML = '';
  const s = getComputedStyle(document.documentElement);
  const cellPx = parseFloat(s.getPropertyValue('--cell'))||13;
  const gapPx  = parseFloat(s.getPropertyValue('--gap'))||2;
  const unit = cellPx + gapPx;
  const startY = parseInt(ALL_KEYS[0]);
  const endY   = parseInt(ALL_KEYS[ALL_KEYS.length-1]);
  for (let y=1992; y<=endY; y+=4) {
    const span = document.createElement('span');
    span.textContent = y;
    span.style.left = ((y-startY)*12*unit)+'px';
    ruler.appendChild(span);
  }
}
buildRuler();
window.addEventListener('resize', buildRuler);

// Toggle
document.querySelectorAll('.fmns-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.fmns-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.fmns-view').forEach(v => v.classList.remove('active'));
    document.getElementById('fmns-'+btn.dataset.view).classList.add('active');
  });
});
</script>
<script>
function reportHeight() {
  const h = document.body.scrollHeight;
  window.parent.postMessage(h, '*');
}
// Fire immediately, then repeatedly for 3 seconds to catch font load / layout settle
reportHeight();
[100, 300, 600, 1000, 2000, 3000].forEach(ms => setTimeout(reportHeight, ms));
window.addEventListener('resize', reportHeight);
document.querySelectorAll('.fmns-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    [50, 200, 500].forEach(ms => setTimeout(reportHeight, ms));
  });
});
</script>
</body>
</html>
